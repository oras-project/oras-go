apiVersion: v1
kind: Namespace
metadata:
  name: oras-functional-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: oras-functional-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: oras-functional-test
spec:
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
