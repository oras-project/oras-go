apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-auth-config
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {"rootDirectory": "/var/lib/registry-auth"},
      "http": {
        "address": "0.0.0.0",
        "port": "5001",
        "auth": {"htpasswd": {"path": "/etc/zot/htpasswd"}}
      },
      "log": {"level": "debug"}
    }
